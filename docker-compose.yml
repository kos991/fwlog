services:
  nat-query:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nat-query
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LOG_DIR: /data/sangfor_fw_log
      DB_FILE: /data/index/nat_logs.duckdb
      PORT: 8080
      WORKERS: 4
      AUTO_SCAN_ENABLED: "true"
      AUTO_SCAN_INTERVAL_SEC: 30
      GIN_MODE: release
    volumes:
      - ./data/sangfor_fw_log:/data/sangfor_fw_log
      - ./data/index:/data/index
