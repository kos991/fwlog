name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - name: windows-amd64-debug
            runs-on: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2 toolchain
        if: matrix.goos == 'windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-tools

      - name: Expose MSYS2 toolchain
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $msysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwPath = Join-Path $msysRoot 'ucrt64\bin'
          if (-not (Test-Path $mingwPath)) {
            throw "MSYS2 UCRT64 path not found: $mingwPath"
          }
          $mingwPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$mingwPath\gcc.exe" --version
          & "$mingwPath\g++.exe" --version

      - name: Prepare DuckDB shared library (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $duckdbDir = Join-Path $PWD 'third_party\duckdb\windows-amd64'
          $zipPath = Join-Path $duckdbDir 'libduckdb-windows-amd64.zip'

          New-Item -ItemType Directory -Force -Path $duckdbDir | Out-Null
          Invoke-WebRequest -UseBasicParsing 'https://github.com/duckdb/duckdb/releases/download/v0.10.2/libduckdb-windows-amd64.zip' -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $duckdbDir -Force

          Push-Location $duckdbDir
          gendef duckdb.dll
          dlltool -d duckdb.def -l libduckdb.dll.a -D duckdb.dll
          Pop-Location

          Get-ChildItem $duckdbDir | Select-Object Name,Length | Format-Table -AutoSize

      - name: Verify required release files
        shell: bash
        run: |
          set -euo pipefail
          for path in main.go go.mod nat-query-service.service; do
            [[ -f "$path" ]] || {
              echo "Missing required file: $path" >&2
              exit 1
            }
          done

      - name: Download Go modules
        shell: bash
        run: |
          set -euo pipefail
          go mod download

      - name: Run Go tests (Linux)
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          go test ./...

      - name: Build Go service (Linux)
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          mkdir -p dist

          output="dist/nat-query-service"
          if [[ "$GOOS" == "windows" ]]; then
            output="${output}.exe"
            go build -trimpath -o "$output" main.go
          else
            go build -trimpath -ldflags "-s -w" -o "$output" main.go
          fi

          [[ -f "$output" ]] || {
            echo "Expected build output not found: $output" >&2
            exit 1
          }

      - name: Build Go service (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
          CGO_CFLAGS: -I${{ github.workspace }}\third_party\duckdb\windows-amd64
          CGO_LDFLAGS: -L${{ github.workspace }}\third_party\duckdb\windows-amd64
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -tags=duckdb_use_lib -o "dist/nat-query-service.exe" main.go
          if (-not (Test-Path "dist/nat-query-service.exe")) {
            throw "Expected build output not found: dist/nat-query-service.exe"
          }
