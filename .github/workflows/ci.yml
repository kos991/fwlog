name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - name: windows-amd64-debug
            runs-on: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW toolchain
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          choco install mingw --yes --no-progress
          $mingwPath = Join-Path $env:ChocolateyInstall 'lib\mingw\tools\install\mingw64\bin'
          if (-not (Test-Path $mingwPath)) {
            throw "MinGW path not found: $mingwPath"
          }
          $mingwPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$mingwPath\gcc.exe" --version
          & "$mingwPath\g++.exe" --version

      - name: Verify required release files
        shell: bash
        run: |
          set -euo pipefail
          for path in main.go go.mod nat-query-service.service; do
            [[ -f "$path" ]] || {
              echo "Missing required file: $path" >&2
              exit 1
            }
          done

      - name: Download Go modules
        shell: bash
        run: |
          set -euo pipefail
          go mod download

      - name: Build Go service
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          mkdir -p dist

          output="dist/nat-query-service"
          if [[ "$GOOS" == "windows" ]]; then
            output="${output}.exe"
            go build -trimpath -o "$output" main.go
          else
            go build -trimpath -ldflags "-s -w" -o "$output" main.go
          fi

          [[ -f "$output" ]] || {
            echo "Expected build output not found: $output" >&2
            exit 1
          }
