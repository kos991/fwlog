name: Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        shell: bash
        run: |
          set -euo pipefail
          docker buildx version
          builder="builder-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker buildx create --name "$builder" --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute Docker metadata
        id: meta
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          sanitize_tag() {
            local value="$1"
            value="${value,,}"
            value="${value//\//-}"
            value="${value// /-}"
            printf '%s' "$value" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          ref_tag="$(sanitize_tag "${GITHUB_REF_NAME}")"
          sha_tag="sha-${GITHUB_SHA::7}"
          declare -a tags
          tags+=("${IMAGE_NAME}:${sha_tag}")

          case "${GITHUB_EVENT_NAME}" in
            push)
              if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
                tags+=("${IMAGE_NAME}:${ref_tag}")
                if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
                  tags+=("${IMAGE_NAME}:latest")
                fi
              elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                tags+=("${IMAGE_NAME}:${ref_tag}")
              fi
              ;;
            pull_request)
              tags+=("${IMAGE_NAME}:pr-${{ github.event.number }}")
              ;;
            workflow_dispatch)
              if [[ -n "${ref_tag}" ]]; then
                tags+=("${IMAGE_NAME}:${ref_tag}")
              fi
              ;;
          esac

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}" | awk '!seen[$0]++'
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
