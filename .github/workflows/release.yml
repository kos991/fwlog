name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v1.0.0
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: Build release assets (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - name: windows-amd64-debug
            runs-on: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          [[ "$version" =~ ^v[0-9].* ]] || {
            echo "Invalid release version: $version" >&2
            exit 1
          }

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Setup MSYS2 toolchain
        if: matrix.goos == 'windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-tools

      - name: Expose MSYS2 toolchain
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $msysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwPath = Join-Path $msysRoot 'ucrt64\bin'
          if (-not (Test-Path $mingwPath)) {
            throw "MSYS2 UCRT64 path not found: $mingwPath"
          }
          $mingwPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$mingwPath\gcc.exe" --version
          & "$mingwPath\g++.exe" --version

      - name: Prepare DuckDB shared library (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $duckdbDir = Join-Path $PWD 'third_party\duckdb\windows-amd64'
          $zipPath = Join-Path $duckdbDir 'libduckdb-windows-amd64.zip'

          New-Item -ItemType Directory -Force -Path $duckdbDir | Out-Null
          Invoke-WebRequest -UseBasicParsing 'https://github.com/duckdb/duckdb/releases/download/v0.10.2/libduckdb-windows-amd64.zip' -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $duckdbDir -Force

          Push-Location $duckdbDir
          gendef duckdb.dll
          dlltool -d duckdb.def -l libduckdb.dll.a -D duckdb.dll
          Pop-Location

          Get-ChildItem $duckdbDir | Select-Object Name,Length | Format-Table -AutoSize

      - name: Verify required release files
        shell: bash
        run: |
          set -euo pipefail
          for path in main.go ip_engine.go go.mod nat-query-service.service; do
            [[ -f "$path" ]] || {
              echo "Missing required file: $path" >&2
              exit 1
            }
          done

      - name: Download Go modules
        shell: bash
        run: |
          set -euo pipefail
          go mod download

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Test Go service compile path
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          go test -v main.go ip_engine.go main_test.go

      - name: Build release binaries (Linux)
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          mkdir -p dist release

          build_output="dist/nat-query-service"
          asset_name="nat-query-service_${GOOS}_${GOARCH}"
          go build -trimpath -ldflags "-s -w" -o "$build_output" main.go ip_engine.go
          cp "$build_output" "release/$asset_name"

      - name: Build release binaries (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
          CGO_CFLAGS: -I${{ github.workspace }}\third_party\duckdb\windows-amd64
          CGO_LDFLAGS: -L${{ github.workspace }}\third_party\duckdb\windows-amd64
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $assetName = "nat-query-service_windows_amd64_debug.exe"
          $zipName = "nat-query-service_windows_amd64_debug.zip"
          $packageDir = Join-Path $PWD 'pkg_temp\windows-amd64-debug'

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          go build -trimpath -tags=duckdb_use_lib -o "$packageDir/$assetName" main.go ip_engine.go
          if (-not (Test-Path "$packageDir/$assetName")) {
            throw "Expected build output not found: $packageDir/$assetName"
          }
          Copy-Item 'third_party\duckdb\windows-amd64\duckdb.dll' "$packageDir\duckdb.dll" -Force

          Compress-Archive -Path "$packageDir\*" -DestinationPath "release\$zipName" -Force
          if (-not (Test-Path "release\$zipName")) {
            throw "Expected zip output not found: release\$zipName"
          }

      - name: Package Linux deployment archive
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          package_root="pkg_temp/nat-query-service_${GOOS}_${GOARCH}"

          rm -rf "$package_root"
          mkdir -p "$package_root"

          cp dist/nat-query-service "$package_root/nat-query-service"
          cp nat-query-service.service "$package_root/"

          cat > "$package_root/README_RELEASE.md" <<EOF
          NAT Query Service
          Release: $version
          Target: ${GOOS}/${GOARCH}

          Contents:
          - nat-query-service
          - nat-query-service.service

          Deploy:
          1. Copy nat-query-service to /opt/nat-query/
          2. Copy nat-query-service.service to /etc/systemd/system/
          3. Run systemctl daemon-reload
          4. Run systemctl enable --now nat-query-service
          EOF

          tar -C "$package_root" -czf "release/nat-query-service_${GOOS}_${GOARCH}.tar.gz" .

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          [[ "$version" =~ ^v[0-9].* ]] || {
            echo "Invalid release version: $version" >&2
            exit 1
          }

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: List assembled assets
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f | sort

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"

          gh auth status

          if gh release view "$version" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $version already exists."
          else
            gh release create "$version" \
              --repo "$GH_REPO" \
              --title "$version" \
              --target "${GITHUB_SHA}" \
              --notes "Automated release for $version"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"

          mapfile -t assets < <(find release-assets -maxdepth 1 -type f | sort)
          [[ "${#assets[@]}" -gt 0 ]] || {
            echo "No release assets found." >&2
            exit 1
          }

          gh release upload "$version" "${assets[@]}" --repo "$GH_REPO" --clobber
