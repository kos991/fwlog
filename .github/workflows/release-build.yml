name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ubuntu-24.04
            goos: linux
            goarch: amd64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - name: windows-amd64
            runs-on: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2 toolchain
        if: matrix.goos == 'windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-tools

      - name: Expose MSYS2 toolchain
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $msysRoot = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwPath = Join-Path $msysRoot 'ucrt64\bin'
          if (-not (Test-Path $mingwPath)) {
            throw "MSYS2 UCRT64 path not found: $mingwPath"
          }
          $mingwPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$mingwPath\gcc.exe" --version
          & "$mingwPath\g++.exe" --version

      - name: Prepare DuckDB shared library for Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $duckdbDir = Join-Path $PWD 'third_party\duckdb\windows-amd64'
          $zipPath = Join-Path $duckdbDir 'libduckdb-windows-amd64.zip'
          New-Item -ItemType Directory -Force -Path $duckdbDir | Out-Null
          Invoke-WebRequest -UseBasicParsing 'https://github.com/duckdb/duckdb/releases/download/v0.10.2/libduckdb-windows-amd64.zip' -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $duckdbDir -Force
          Push-Location $duckdbDir
          gendef duckdb.dll
          dlltool -d duckdb.def -l libduckdb.dll.a -D duckdb.dll
          Pop-Location

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build Linux binary
        if: matrix.goos == 'linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
        run: |
          set -euo pipefail
          mkdir -p release
          asset="nat-query-service_${GOOS}_${GOARCH}"
          go build -trimpath -ldflags "-s -w" -o "release/$asset" main.go ip_engine.go

      - name: Build Windows binary package
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
          CGO_CFLAGS: -I${{ github.workspace }}\third_party\duckdb\windows-amd64
          CGO_LDFLAGS: -L${{ github.workspace }}\third_party\duckdb\windows-amd64
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $packageDir = Join-Path $PWD 'pkg_temp\windows-amd64'
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          go build -trimpath -tags=duckdb_use_lib -o "$packageDir\nat-query-service_windows_amd64.exe" main.go ip_engine.go
          Copy-Item 'third_party\duckdb\windows-amd64\duckdb.dll' "$packageDir\duckdb.dll" -Force
          Compress-Archive -Path "$packageDir\*" -DestinationPath "release\nat-query-service_windows_amd64.zip" -Force

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          gh release view "$version" --repo "$GH_REPO" >/dev/null
          gh release upload "$version" release/* --repo "$GH_REPO" --clobber

  build-kylin:
    name: Build Kylin V10 SP1 ${{ matrix.arch-name }}
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch-name: x86_64
            runs-on: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            goarch: amd64
            asset-arch: x86_64
          - arch-name: aarch64
            runs-on: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            goarch: arm64
            asset-arch: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show compatibility baseline
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          ldd --version | sed -n '1p'
          gcc --version | sed -n '1p'

      - name: Build Kylin compatible package
        shell: bash
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: gcc
          CXX: g++
          ASSET_ARCH: ${{ matrix.asset-arch }}
        run: |
          set -euo pipefail
          mkdir -p release "pkg_temp/kylin-v10-sp1-${ASSET_ARCH}"

          package_dir="pkg_temp/kylin-v10-sp1-${ASSET_ARCH}"
          binary="nat-query-service"
          asset="nat-query-service_kylin-v10-sp1_${ASSET_ARCH}.tar.gz"

          go build -trimpath -ldflags "-s -w" -o "${package_dir}/${binary}" main.go ip_engine.go
          cp nat-query-service.service "${package_dir}/"

          cat > "${package_dir}/README_KYLIN_V10_SP1.txt" <<'EOF'
          NAT Query Service - Kylin V10 SP1

          Target:
          - Kylin Linux Advanced Server V10 SP1
          - glibc 2.28 compatible build
          - systemd deployment

          Install:
          1. install -d /opt/nat-query
          2. install -m 0755 nat-query-service /opt/nat-query/nat-query-service
          3. install -m 0644 nat-query-service.service /etc/systemd/system/nat-query-service.service
          4. systemctl daemon-reload
          5. systemctl enable --now nat-query-service

          Default access:
          - http://SERVER_IP:8080

          Runtime data:
          - /data/logs
          - /data/index/nat_logs.duckdb
          - /data/exports
          EOF

          max_glibc="$(readelf -V "${package_dir}/${binary}" | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -n 1 || true)"
          echo "Max GLIBC symbol: ${max_glibc:-not detected}"
          if [[ -n "$max_glibc" && "$max_glibc" != "GLIBC_2.28" && "$max_glibc" > "GLIBC_2.28" ]]; then
            echo "Unexpected GLIBC baseline: $max_glibc" >&2
            exit 1
          fi

          tar -C "$package_dir" -czf "release/$asset" .

      - name: Upload Kylin release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          gh release view "$version" --repo "$GH_REPO" >/dev/null
          gh release upload "$version" release/* --repo "$GH_REPO" --clobber
